name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    strategy:
      matrix:
        config:
          - { name: windows-x86_64, os: windows-latest, target: x86_64-pc-windows-msvc, lib_name: bacy.dll }
          - { name: windows-aarch64, os: windows-latest, target: aarch64-pc-windows-msvc, lib_name: bacy.dll }
          - { name: macos-x86_64, os: macos-15, target: x86_64-apple-darwin, lib_name: libbacy.dylib }
          - { name: macos-aarch64, os: macos-15, target: aarch64-apple-darwin, lib_name: libbacy.dylib }
          - { name: linux-x86_64, os: ubuntu-latest, target: x86_64-unknown-linux-gnu, lib_name: libbacy.so }
          - { name: linux-aarch64, os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, lib_name: libbacy.so }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.config.target }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.config.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (C API)
        run: cargo build --release -p bacy-ffi --target ${{ matrix.config.target }}

      - name: Prepare C API artifact
        shell: bash
        run: |
          mkdir -p ./publish/c-api
          cp target/${{ matrix.config.target }}/release/${{ matrix.config.lib_name }} ./publish/c-api/

      - name: Build (UniFFI)
        run: cargo build --release -p bacy-ffi --target ${{ matrix.config.target }} --features uniffi

      - name: Prepare UniFFI artifact
        shell: bash
        run: |
          mkdir -p ./publish/uniffi
          cp target/${{ matrix.config.target }}/release/${{ matrix.config.lib_name }} ./publish/uniffi/

      - name: Upload C API artifact
        uses: actions/upload-artifact@v4
        with:
          name: bacy-${{ matrix.config.name }}-c-api
          path: publish/c-api

      - name: Upload UniFFI artifact
        uses: actions/upload-artifact@v4
        with:
          name: bacy-${{ matrix.config.name }}-uniffi
          path: publish/uniffi